# Sextant config for the Sextant repo. We dogfood our own grader, so
# the verdict thresholds are deliberately strict: zero errors, zero
# warns, zero info. The post-edit hook surfaces findings to the agent
# during the edit loop; the sample git pre-commit hook
# (`plugin/hooks/pre-commit.sh`) is the hard gate that blocks commits
# until the diff is clean, and CI fails the PR on any regression at
# info or above.

[verdict]
max_errors = 0
max_warns = 0
max_info = 0

[size]
file_length_warn = 400
file_length_error = 800
