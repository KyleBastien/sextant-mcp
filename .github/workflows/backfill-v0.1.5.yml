---
name: Backfill v0.1.5 GitHub Release

on:
  push:
    branches:
      - claude/backfill-v0.1.5-release

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create v0.1.5 release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view v0.1.5 --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "v0.1.5 release already exists; nothing to do."
            exit 0
          fi
          gh release create v0.1.5 \
            --repo "${{ github.repository }}" \
            --target cac639d953cfb78d79fc77151d6db3e0c29a2987 \
            --title "v0.1.5" \
            --notes "Backfilled by automation after release-please's tagging step silently skipped this version. PR #24 ships the structural fix for the title-pattern issue that caused the skip. Changes shipped in v0.1.5: 5 strict TS pack rules for loose-typing escape hatches (#21), propose-only autofix patches across all rule types (#19), roll release-please manifest back to unblock workflow (#22)."
