---
name: Backfill v0.1.7 GitHub Release

on:
  push:
    branches:
      - claude/backfill-v0.1.7-release

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create v0.1.7 release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view v0.1.7 --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "v0.1.7 release already exists; nothing to do."
            exit 0
          fi
          gh release create v0.1.7 \
            --repo "${{ github.repository }}" \
            --target dea3504d0284321ca061d0d28aa49153f9d27c45 \
            --title "v0.1.7" \
            --notes "Backfilled by automation. Release-please ignored the explicit \`component: \"\"\` setting (#27) and continued matching against the package-name. Follow-up structural fix drops package-name entirely from the root config. Changes shipped in v0.1.7: set empty component on root package (#27)."
