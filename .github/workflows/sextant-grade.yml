name: Sextant grade

# Run Sextant against its own PRs. Self-host == eat our own dogfood;
# regressions in the rule set show up here first.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  grade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # The action needs both base + head commits to compute a diff.
          # Setting fetch-depth=0 makes the merge-base lookup work even
          # when the PR has many commits behind main.
          fetch-depth: 0

      # Until we cut a real release, build sextant from source. Once
      # `v0.1.0` is tagged this whole job becomes:
      #
      #     - uses: kylebastien/sextant-mcp/action@v0.1.0
      #       with:
      #         fail-on: error
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build sextant
        run: cargo build --release --bin sextant --locked

      - name: Grade PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          ./target/release/sextant grade --pr \
            --base "$base" \
            --baseline-cache .sextant/cache/baseline \
            --format markdown \
            --output sextant-review.md \
            --report-json sextant-report.json \
            --fail-on error || grade_status=$?
          ./action/scripts/post-review.sh sextant-review.md
          exit "${grade_status:-0}"

      - name: Grade main
        if: github.event_name == 'push'
        run: |
          ./target/release/sextant grade --fail-on error
