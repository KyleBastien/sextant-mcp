name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Linux runs fmt + clippy + test (the canonical lint set). macOS
        # and Windows just run tests so we catch platform-specific bugs
        # in the diff/git2/judge code paths without quadruple-linting.
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      # `actions-rust-lang/setup-rust-toolchain` is the maintained successor
      # to `dtolnay/rust-toolchain`. It handles the macOS runner case where
      # the pre-installed `cargo` is actually a `rustup-init` stub that
      # shadows the real toolchain, and it bundles `Swatinem/rust-cache`
      # so we don't need to wire it up separately.
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      # Fail loudly if the toolchain didn't install cleanly. Without this,
      # a broken shim produces opaque errors like `unexpected argument 'test'`
      # from `rustup-init` when `cargo test` runs.
      - name: Verify toolchain
        run: |
          cargo --version
          rustc --version
          rustup show active-toolchain

      - name: cargo fmt
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --all -- --check

      - name: cargo clippy
        if: matrix.os == 'ubuntu-latest'
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace --locked

  shellcheck:
    name: shellcheck action scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          shellcheck action/scripts/*.sh

  yamllint:
    name: yamllint workflows + action
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run yamllint
        run: |
          pip install --quiet 'yamllint==1.35.1'
          # GitHub workflows are full of `on: push` etc. — relax the line
          # length and truthy rules so lint reflects real issues, not style.
          yamllint -d '{extends: default, rules: {line-length: disable, truthy: {check-keys: false}, document-start: disable}}' \
            .github/workflows action/action.yml
