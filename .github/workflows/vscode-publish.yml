name: VS Code extension publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. vscode-v0.1.0). Must already exist.'
        required: true

permissions:
  contents: write

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'vscode-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Package .vsix
        run: npx vsce package --no-dependencies

      - name: Publish to Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx vsce publish --no-dependencies --pat "$VSCE_PAT"

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          tag="${{ github.event.inputs.tag || github.event.release.tag_name }}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Attach .vsix to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          vsix=$(ls ./*.vsix | head -n 1)
          gh release upload "$TAG" "$vsix" --clobber
