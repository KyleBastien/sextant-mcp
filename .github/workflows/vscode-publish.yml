name: VS Code extension publish

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish:
    if: startsWith(github.event.release.tag_name, 'vscode-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Package .vsix
        run: npx vsce package --no-dependencies

      - name: Publish to Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx vsce publish --no-dependencies --pat "$VSCE_PAT"

      - name: Attach .vsix to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          vsix=$(ls ./*.vsix | head -n 1)
          gh release upload "$TAG" "$vsix" --clobber
