---
name: Backfill v0.1.6 GitHub Release

on:
  push:
    branches:
      - claude/backfill-v0.1.6-release

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create v0.1.6 release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view v0.1.6 --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "v0.1.6 release already exists; nothing to do."
            exit 0
          fi
          gh release create v0.1.6 \
            --repo "${{ github.repository }}" \
            --target 2b43f3909a521ed6f7b5b66e750ab3eca655a945 \
            --title "v0.1.6" \
            --notes "Backfilled by automation. Release-please's body parser still skipped this version because the root-package body section's empty prefix doesn't match the configured component 'sextant' for path '.'. A follow-up config PR explicitly sets component to empty string to fix this structurally. Changes shipped in v0.1.6: pin release-please title pattern (#24), drop scope placeholder to avoid duplicate capture group (#25)."
