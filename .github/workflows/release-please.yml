name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # release-please pushes the tag using GITHUB_TOKEN, which (by GitHub
  # design) does not trigger downstream `push: tags` workflows. Dispatch
  # release.yml explicitly so the build matrix runs and uploads binaries
  # to the release release-please just created.
  trigger-release-build:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Dispatch release workflow on the new tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          gh workflow run release.yml \
            --repo "${{ github.repository }}" \
            --ref "$TAG" \
            -f tag="$TAG"
