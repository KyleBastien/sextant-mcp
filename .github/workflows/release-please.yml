name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      rust_release_created: ${{ steps.rp.outputs['.--release_created'] }}
      rust_tag_name: ${{ steps.rp.outputs['.--tag_name'] }}
      vscode_release_created: ${{ steps.rp.outputs['editors/vscode--release_created'] }}
      vscode_tag_name: ${{ steps.rp.outputs['editors/vscode--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # release-please pushes the tag using GITHUB_TOKEN, which (by GitHub
  # design) does not trigger downstream `push: tags` or `release:
  # published` workflows. Dispatch each downstream pipeline explicitly so
  # the tag it cares about kicks off the right build.
  trigger-release-build:
    needs: release-please
    if: needs.release-please.outputs.rust_release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Dispatch release workflow on the new tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.rust_tag_name }}
        run: |
          gh workflow run release.yml \
            --repo "${{ github.repository }}" \
            --ref "$TAG" \
            -f tag="$TAG"

  trigger-vscode-publish:
    needs: release-please
    if: needs.release-please.outputs.vscode_release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Dispatch vscode-publish workflow on the new tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.vscode_tag_name }}
        run: |
          gh workflow run vscode-publish.yml \
            --repo "${{ github.repository }}" \
            --ref "$TAG" \
            -f tag="$TAG"
